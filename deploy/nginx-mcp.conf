# nginx reverse proxy for mcp.meetstream.ai -> local meetstream-mcp container (port 8080)
# certbot --nginx will extend this automatically with the ssl_certificate/listen 443 block.
server {
    listen 80;
    server_name mcp.meetstream.ai;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP may hold the connection open for SSE-framed responses.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
